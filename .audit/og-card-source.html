<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1200px; height: 630px; overflow: hidden; }
body {
  background: #060608;
  font-family: 'Manrope', sans-serif;
  color: #eef2f7;
  position: relative;
  isolation: isolate;
}
/* Aurora */
.bg::before {
  content: ''; position: absolute; inset: -15%; z-index: -2;
  background:
    radial-gradient(ellipse 55% 45% at 30% 28%, rgba(232,167,38,0.30) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 78% 62%, rgba(184,117,30,0.26) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 50% 95%, rgba(240,198,108,0.18) 0%, transparent 65%),
    radial-gradient(ellipse 40% 35% at 12% 80%, rgba(95,168,255,0.10) 0%, transparent 60%);
  filter: blur(40px);
}
/* Grid */
.bg::after {
  content: ''; position: absolute; inset: 0; z-index: -1;
  background-image:
    linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 72px 72px;
  mask-image: radial-gradient(ellipse 75% 65% at 50% 50%, #000 0%, transparent 80%);
}
.brand {
  position: absolute; top: 50px; left: 60px;
  display: inline-flex; align-items: center; gap: 14px;
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 28px; font-weight: 800; letter-spacing: -0.025em;
  color: #e8a726;
}
.brand::before {
  content: ''; width: 14px; height: 14px; border-radius: 50%;
  background: #e8a726;
  box-shadow: 0 0 24px rgba(232,167,38,0.65);
}
.body {
  position: absolute; left: 60px; right: 60px; top: 220px;
}
.eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px; font-weight: 700;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: #e8a726; margin-bottom: 24px;
}
h1 {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 92px; font-weight: 800;
  letter-spacing: -0.04em; line-height: 0.98;
  color: #eef2f7;
  margin-bottom: 26px;
  max-width: 16ch;
}
h1 em {
  font-style: normal;
  background: linear-gradient(100deg, #e8a726 0%, #f0c66c 50%, #e8a726 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
.lede {
  font-size: 24px; line-height: 1.5;
  color: #879eb7;
  max-width: 56ch;
}
.foot {
  position: absolute; bottom: 50px; left: 60px; right: 60px;
  display: flex; justify-content: space-between; align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px; letter-spacing: 0.16em; text-transform: uppercase;
  color: #445566;
}
.foot .left { color: #879eb7; }
.tags {
  display: flex; gap: 14px;
}
.tag {
  padding: 6px 14px;
  border: 1px solid rgba(232,167,38,0.32);
  background: rgba(232,167,38,0.08);
  color: #e8a726;
  border-radius: 100px;
  font-weight: 800;
  font-size: 14px;
  letter-spacing: 0.14em;
}
</style>
</head>
<body class="bg">
  <div class="brand">Attest&nbsp;AI</div>
  <div class="body">
    <div class="eyebrow">Free practical course · EU-first</div>
    <h1>AI at work, without the <em>accidents</em>.</h1>
    <p class="lede">11 modules + 2 role tracks + 2 ship-ready templates. Plain English. Standards-cited. Free.</p>
  </div>
  <div class="foot">
    <div class="left">attest-ai.com</div>
    <div class="tags">
      <span class="tag">EU AI Act</span>
      <span class="tag">GDPR</span>
      <span class="tag">ISO 42001</span>
      <span class="tag">ISO 27001</span>
    </div>
  </div>
</body>
</html>
