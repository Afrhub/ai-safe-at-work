<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#ffffff" />
<meta name="color-scheme" content="dark light" />
<meta name="robots" content="noindex, nofollow" />
<script src="/assets/theme.js"></script>
<title>Portal sign-in · Attest AI</title>
<link rel="preload" href="../assets/fonts/ahn-latin.woff2" as="font" type="font/woff2" crossorigin />
<link rel="stylesheet" href="../assets/fonts/atkinson.css?v=1" />
<link rel="stylesheet" href="../assets/style.css?v=20" />
<link rel="stylesheet" href="assets/portal.css?v=4" />
<script defer src="../assets/cinema.js?v=11"></script>
<script src="config.js"></script>
</head>
<body>
<div class="theme-toggle-host" style="position:fixed;top:1.2rem;right:1.2rem;z-index:30"></div>
<div class="auth-wrap">
 <div class="auth-card">
 <img src="/assets/logo.png?v=2" alt="AI Safe@Work" class="brand-logo" style="height:184px;width:auto;display:block;margin:0 auto .8rem" />
 <div class="ey" style="font-family:var(--font-mono);font-size:0.62rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent)">Attest AI · Sign in</div>

 <!-- Credentials (sign-up is gated: accounts are provisioned on purchase or by a manager/reseller) -->
 <form id="step-login">
 <h1 id="login-title">Sign in</h1>
 <p class="sub">Reseller, manager and team access.</p>
 <div class="field"><label for="email">Email</label><input id="email" type="email" autocomplete="username" required /></div>
 <div class="field"><label for="pw">Password</label><input id="pw" type="password" autocomplete="current-password" required minlength="8" /></div>
 <button class="btn-primary" type="submit" id="login-btn">Continue</button>
 <p style="margin-top:1rem;font-size:0.82rem;color:var(--text2)">No account yet? Access is set up when you buy a plan or when your manager invites you. <a href="/about.html#contact" style="color:var(--accent);font-weight:700">Get in touch</a>.</p>
 </form>

 <p id="msg" class="auth-msg" role="status"></p>
 </div>
</div>

<script type="module" src="assets/login.js?v=2"></script>
</body>
</html>
