# Netlify config for AI Safe@Work
# Mirror of doctrine §§ Anti-scraping + Audit-readiness postures.
# Reviewed quarterly per .audit/course-quality/refresh-cadence.md.

[build]
  publish = "."
  command = ""

# Don't deploy audit-pack via Netlify even if path is requested
[[redirects]]
  from = "/.audit/*"
  to = "/404.html"
  status = 404
  force = true

# Doctrine: stays public on GitHub (transparency wedge per doctrine
# § Distribution principle 3), hidden from Netlify marketing site.
# Marketing site stays sales-shaped; transparency artefact lives on
# GitHub only. See decision log entry 2026-05-19.
[[redirects]]
  from = "/DOCTRINE.md"
  to = "/404.html"
  status = 404
  force = true

# README: dev-docs, not marketing. Same posture as doctrine — public on
# GitHub, hidden from Netlify marketing surface. Decided 2026-05-19.
[[redirects]]
  from = "/README.md"
  to = "/404.html"
  status = 404
  force = true

# Headers below in _headers (separate file for clarity + per-path scoping).
# netlify.toml [[headers]] supports glob patterns but per-path detail in
# _headers reads better and matches Netlify-native pattern.
